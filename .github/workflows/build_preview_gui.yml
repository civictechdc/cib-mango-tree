name: GUI Preview Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'gui-prototype'
        type: string
      version_name:
        description: 'Preview version name (e.g., ux-test-v1, nav-improvements)'
        required: true
        default: 'preview'
        type: string
      create_release:
        description: 'Create a draft release (vs artifact only)'
        required: true
        type: boolean
        default: false
      notes:
        description: 'Build notes for the team'
        required: false
        default: 'GUI preview build for testing'
        type: string

jobs:
  get-commit-info:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Get commit info
        id: commit_info
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    outputs:
      sha_short: ${{ steps.commit_info.outputs.sha_short }}

  build-preview:
    needs: get-commit-info
    uses: ./.github/workflows/build_gui.yml
    secrets: inherit
    with:
      is_release: false

  create-draft-release:
    needs: [get-commit-info, build-preview]
    if: ${{ github.event.inputs.create_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Zip directory artifacts for release upload
        shell: bash
        run: |
          for artifact_dir in artifacts/*/; do
            if [ -d "$artifact_dir" ]; then
              dir_name=$(basename "$artifact_dir")
              # If artifact is already a zip, just copy it to root
              if ls "$artifact_dir"/*.zip 1>/dev/null 2>&1; then
                cp "$artifact_dir"/*.zip "artifacts/"
              elif [ -d "$artifact_dir/CIBMangoTree.app" ]; then
                (cd "$artifact_dir" && zip -r -y "${dir_name}.zip" CIBMangoTree.app)
              elif [ -d "$artifact_dir/CIBMangoTree" ]; then
                (cd "$artifact_dir" && zip -r "${dir_name}.zip" CIBMangoTree)
              fi
            fi
          done
          rm -rf artifacts/*/

      - name: Create Draft Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: true
          tag_name: gui-preview-${{ github.event.inputs.version_name }}-${{ needs.get-commit-info.outputs.sha_short }}
          name: "GUI Preview: ${{ github.event.inputs.version_name }}"
          files: |
            artifacts/*.zip
          body: |
            # GUI Preview Build

            **Version:** `${{ github.event.inputs.version_name }}`
            **Branch:** `${{ github.event.inputs.branch }}`
            **Commit:** [`${{ needs.get-commit-info.outputs.sha_short }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Workflow Run:** [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ## Build Notes

            ${{ github.event.inputs.notes }}

            ---

            ## Installation Instructions

            ### Windows
            1. Download `CIBMangoTree_windows.zip`
            2. Extract the zip file
            3. Run `CIBMangoTree.exe`
            4. If Windows Defender warns about unsigned app, click "More info" → "Run anyway"

            ### macOS
            1. Download `CIBMangoTree_macos-*.zip` (choose x86 or arm64 for your Mac)
            2. Extract the zip file
            3. Move `CIBMangoTree.app` to `/Applications/`
            4. **First launch:** Right-click app → "Open" to bypass Gatekeeper
            5. For subsequent launches, double-click normally

            ---

            This is an unsigned preview build for internal testing only.
            Not for production use or distribution outside the team.
