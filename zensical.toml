[project]
site_name = "CIB Mango Tree"
site_author = "CIB Mango Tree"
site_description = "An interactive python terminal UI wrapper for Mango Tree analyzers."
site_url = "https://cibmangotree.org"
repo_url = "https://github.com/civictechdc/cib-mango-tree"
copyright = "Copyright &copy; 2025 CIB Mango Tree"
extra_css = ["stylesheets/extra.css"]

nav = [
    {"Home" = [
        "index.md",
        "guides/get-started/overview.md",
        "license.md",
    ]},
    {"Guides" = [
        {"Getting Started" = [
            "guides/get-started/installation.md",
        ]},
        {"Contributing" = [
            "guides/contributing/new_contributor_guide.md",
            {"Technical Guides" = [
                "guides/contributing/github_workflow.md",
                "guides/contributing/analyzers.md",
                {"Implementing Dashboards" = [
                    "guides/contributing/dashboards/shiny.md",
                ]},
                "guides/contributing/logging.md",
                "guides/contributing/testing.md",
                "guides/contributing/ai_assisted_dev.md",
            ]},
        ]},
        {"Design Philosophy" = [
            "guides/design-philosophy/architecture.md",
            "guides/design-philosophy/core-domain.md",
            "guides/design-philosophy/edge-domain.md",
            "guides/design-philosophy/content-domain.md",
        ]},
    ]},
    {"Reference (CLI)" = [
        "reference/analyzer_interface.md",
        "reference/components.md",
        "reference/app.md",
        "reference/preprocessing.md",
        "reference/terminal_tools.md",
        "reference/importing.md",
        "reference/meta.md",
        "reference/storage.md",
        "reference/testing.md",
        "reference/tokenizer.md",
    ]},
]

[project.theme]
variant = "modern"
logo = "img/cibmt_logo.svg"
favicon = "img/cibmt_logo.svg"
features = [
    "navigation.tracking",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.indexes",
    "content.code.copy",
    "content.tooltips",
    "toc.follow",
]

[project.theme.palette]
scheme = "cibmt"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.blocks.caption]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
extensions = ["griffe_pydantic"]
filters = ["!^_[^_]", "!^test_"]
heading_level = 2
parameter_headings = true
show_category_heading = true
show_root_full_path = true
show_root_heading = true
show_root_toc_entry = false
show_submodules = true
show_symbol_type_heading = true
show_symbol_type_toc = true
summary = true
