name: Build GUI Executable

on:
  workflow_call:
    secrets:
      APPLE_DEV_EMAIL:
      APP_SPEC_PASS:
      DEV_APP_CERT:
      DEV_APP_CERT_PASS:
      DEV_INST_CERT:
      DEV_INST_CERT_PASS:
      APPLE_KEY_PASS:
      APPLE_APP_CERT_ID:
      APPLE_INST_CERT_ID:
      TEAM_ID:

    inputs:
      is_release:
        default: false
        description: 'Is this a release?'
        type: boolean
        required: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform_name: Windows
            artifact_name: windows
            os: windows-2022
            zip_command: powershell -Command "Compress-Archive -Path 'dist/CIBMangoTree/*' -DestinationPath 'dist/CIBMangoTree_windows.zip'"
            artifact_path: dist/CIBMangoTree_windows.zip
            list_command: dir dist
          - platform_name: MacOS (x86)
            artifact_name: macos-x86
            os: macos-15-intel
            zip_command: cd dist && zip -r CIBMangoTree_macos-x86.zip CIBMangoTree.app
            artifact_path: dist/CIBMangoTree_macos-x86.zip
            pkg_command: |
              mkdir -p /tmp/cibmangotree/
              ditto dist/CIBMangoTree.app /tmp/cibmangotree/CIBMangoTree.app
              chmod +x /tmp/cibmangotree/CIBMangoTree.app/CIBMangoTree
              security unlock-keychain -p $APPLE_KEYCHAIN_PASS build.keychain
              security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASS" build.keychain
              security find-identity -v -p codesigning build.keychain
              pkgbuild --identifier "org.civictechdc.cibmangotree.gui" --timestamp --root /tmp/cibmangotree --install-location /Applications "./dist/CIBMangoTree_macos-x86_signed.pkg" --sign "$APPLE_INST_CERT_ID"
            list_command: ls -ll dist
          - platform_name: MacOS (arm64)
            artifact_name: macos-arm64
            os: macos-15
            zip_command: cd dist && zip -r CIBMangoTree_macos-arm64.zip CIBMangoTree.app
            artifact_path: dist/CIBMangoTree_macos-arm64.zip
            pkg_command: |
              mkdir -p /tmp/cibmangotree/
              ditto dist/CIBMangoTree.app /tmp/cibmangotree/CIBMangoTree.app
              chmod +x /tmp/cibmangotree/CIBMangoTree.app/CIBMangoTree
              security unlock-keychain -p $APPLE_KEYCHAIN_PASS build.keychain
              security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASS" build.keychain
              security find-identity -v -p codesigning build.keychain
              pkgbuild --identifier "org.civictechdc.cibmangotree.gui" --timestamp --root /tmp/cibmangotree --install-location /Applications "./dist/CIBMangoTree_macos-arm64_signed.pkg" --sign "$APPLE_INST_CERT_ID"
            list_command: ls -ll dist

    name: ${{ matrix.platform_name }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Create macOS keychain
        id: keychain
        if: runner.os == 'macOS' && inputs.is_release
        env:
          APPLE_DEV_EMAIL: ${{secrets.APPLE_DEV_EMAIL}}
          APP_SPEC_PASS: ${{secrets.APP_SPEC_PASS}}
          APPLE_APP_CERTIFICATE: ${{secrets.DEV_APP_CERT}}
          APPLE_APP_CERT_PASSWORD: ${{secrets.DEV_APP_CERT_PASS}}
          APPLE_INST_CERTIFICATE: ${{secrets.DEV_INST_CERT}}
          APPLE_INST_CERT_PASSWORD: ${{secrets.DEV_INST_CERT_PASS}}
          APPLE_KEYCHAIN_PASS: ${{secrets.APPLE_KEY_PASS}}
        run: |
          echo "$APPLE_APP_CERTIFICATE" | base64 --decode > app_certificate.p12
          echo "$APPLE_INST_CERTIFICATE" | base64 --decode > inst_certificate.p12
          security create-keychain -p $APPLE_KEYCHAIN_PASS build.keychain
          security default-keychain -s build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p $APPLE_KEYCHAIN_PASS build.keychain
          security import app_certificate.p12 -k build.keychain -P $APPLE_APP_CERT_PASSWORD -A
          security import inst_certificate.p12 \
            -k build.keychain \
            -P "$APPLE_INST_CERT_PASSWORD" \
            -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k $APPLE_KEYCHAIN_PASS build.keychain
          security find-identity -v -p codesigning -p macappstore

      - name: Print version string (for tag)
        id: get_version_tag
        if: ${{ github.ref_type == 'tag' }}
        run: |
          python -c "with open('VERSION', 'w', encoding='utf-8') as f: f.write('${{ github.ref_name }}')"

      - name: Print version string (for branch)
        id: get_version_branch
        if: ${{ github.ref_type != 'tag' }}
        run: |
          python -c "with open('VERSION', 'w', encoding='utf-8') as f: f.write('${{ github.ref_name }}-${{ github.sha }}')"

      - name: Build the executable
        env:
          APPLE_APP_CERT_ID: "${{ inputs.is_release && secrets.APPLE_APP_CERT_ID || '' }}"
        run: uv run pyinstaller pyinstaller.spec

      - name: Verify build output
        shell: bash
        run: |
          ls -lah dist/
          echo "Looking for: CIBMangoTree"

      - name: Create and sign macOS package
        if: runner.os == 'macOS' && inputs.is_release
        env:
          APPLE_INST_CERT_ID: ${{secrets.APPLE_INST_CERT_ID}}
          APPLE_KEYCHAIN_PASS: ${{secrets.APPLE_KEY_PASS}}
        run: ${{ matrix.pkg_command }}

      - name: Notarize macOS package
        if: runner.os == 'macOS' && inputs.is_release
        env:
          APPLE_DEV_EMAIL: ${{secrets.APPLE_DEV_EMAIL}}
          APPLE_TEAM_ID: ${{secrets.TEAM_ID}}
          APP_SPEC_PASS: ${{secrets.APP_SPEC_PASS}}
        run: xcrun notarytool submit dist/CIBMangoTree_${{matrix.artifact_name}}_signed.pkg --apple-id $APPLE_DEV_EMAIL --team-id $APPLE_TEAM_ID --password $APP_SPEC_PASS --wait

      - name: Staple notarization ticket
        if: runner.os == 'macOS' && inputs.is_release
        run: xcrun stapler staple dist/CIBMangoTree_${{matrix.artifact_name}}_signed.pkg

      - name: Package artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ] && [ "${{ inputs.is_release }}" = "true" ]; then
            mv dist/CIBMangoTree_${{matrix.artifact_name}}_signed.pkg dist/CIBMangoTree_${{matrix.artifact_name}}.pkg
            echo "artifact_path=dist/CIBMangoTree_${{matrix.artifact_name}}.pkg" >> $GITHUB_ENV
          else
            ${{ matrix.zip_command }}
            echo "artifact_path=${{ matrix.artifact_path }}" >> $GITHUB_ENV
          fi

      - name: Clean up macOS artifacts
        if: runner.os == 'macOS' && inputs.is_release
        run: |
          rm -rf /tmp/cibmangotree
          rm -rf dist/CIBMangoTree.app
          rm -rf dist/CIBMangoTree_${{matrix.artifact_name}}.zip

      - name: Inspect dist/ directory
        run: ${{ matrix.list_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gui-${{ matrix.artifact_name }}
          path: ${{ env.artifact_path }}
