name: New Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Version mismatch: tag=v${TAG_VERSION} vs pyproject.toml=${PYPROJECT_VERSION}"
            exit 1
          fi
          echo "✓ Version match: v${TAG_VERSION}"

  call-build_exe:
    needs: validate-version
    uses: ./.github/workflows/build_exe.yml
    secrets: inherit
    with:
      is_release: true
  release:
    needs: call-build_exe
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
